<!DOCTYPE html>
<html lang="bn">
<head>
    <link rel="icon" type="image/png" href="icon-512.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="theme-color" content="#1d4ed8">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nasim Store - Digital Khata</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f8fafc; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .sticky-header { position: sticky; top: 0; z-index: 50; }
        .hidden { display: none; }
        .icon { width: 24px; height: 24px; fill: currentColor; display: inline-block; vertical-align: middle; }
    </style>
</head>
<body>

    <div id="login-screen" class="fixed inset-0 bg-white flex flex-col items-center justify-center p-6 z-[200]">
        <div class="w-full max-sm text-center">
            <h1 class="text-4xl font-bold text-blue-700 mb-2 italic">Nasim Store</h1>
            <p class="text-gray-500 mb-8 font-semibold">সিকিউরিটি পিন দিয়ে প্রবেশ করুন</p>
            <input type="password" id="pin-input" placeholder="পিন কোড" class="w-full p-4 border-2 border-blue-100 rounded-2xl mb-4 text-center text-3xl tracking-widest outline-none focus:border-blue-500 transition-all">
            <button onclick="checkLogin()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold text-xl shadow-lg active:scale-95 transition-all">লগইন করুন</button>
        </div>
    </div>

    <div id="app-content" class="hidden">
        <header class="sticky-header bg-blue-700 text-white p-4 shadow-lg flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="relative w-12 h-12 rounded-full border-2 border-white overflow-hidden bg-gray-200">
                    <img id="profile-pic-display" src="icon-192.png" class="w-full h-full object-cover">
                </div>
                <div>
                    <p class="text-[10px] text-blue-200 uppercase">স্বাগতম</p>
                    <h2 class="font-bold text-lg leading-tight">Nasim Store</h2>
                </div>
            </div>
            <div class="flex gap-4">
                <div class="text-right">
                    <p class="text-[10px] opacity-80 uppercase font-bold">মোট পাওনা</p>
                    <p class="font-bold text-green-300 tracking-wide">৳ <span id="total-receivable">0</span></p>
                </div>
                <div class="text-right">
                    <p class="text-[10px] opacity-80 uppercase font-bold">মোট দেনা</p>
                    <p class="font-bold text-red-300 tracking-wide">৳ <span id="total-payable">0</span></p>
                </div>
            </div>
        </header>

        <div id="dashboard-view">
            <div class="p-4 flex gap-2">
                <input type="text" id="search-box" onkeyup="renderCustomers()" placeholder="কাস্টমার খুঁজুন..." class="flex-1 p-3 rounded-xl border border-blue-100 shadow-sm outline-none focus:ring-2 focus:ring-blue-400">
                <button onclick="showModal('add-customer-modal')" class="bg-blue-600 text-white px-5 py-3 rounded-xl font-bold shadow-md active:scale-95">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                </button>
            </div>

            <main class="p-4 pb-24">
                <h3 class="text-gray-500 font-bold mb-3 flex justify-between">
                    <span>কাস্টমার তালিকা</span>
                    <span id="cust-count" class="text-blue-600 text-xs">০ জন</span>
                </h3>
                <div id="customer-list" class="space-y-3"></div>
            </main>
        </div>

        <div id="details-view" class="hidden fixed inset-0 bg-white z-[60] overflow-y-auto">
            <div class="bg-blue-700 p-4 text-white flex items-center justify-between sticky top-0">
                <button onclick="hideDetails()" class="p-2">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                </button>
                <div class="text-center flex-1 px-4">
                    <h2 id="view-cust-name" class="font-bold text-xl truncate">কাস্টমার নাম</h2>
                    <p id="view-cust-phone" class="text-xs opacity-80">01700000000</p>
                </div>
                <div class="flex gap-2 items-center">
                    <button onclick="shareToWhatsApp()" class="text-green-400 p-2">
                        <svg class="icon" viewBox="0 0 24 24"><path d="M12.04 2c-5.46 0-9.91 4.45-9.91 9.91 0 1.75.46 3.45 1.32 4.95L2.05 22l5.25-1.38c1.45.79 3.08 1.21 4.74 1.21 5.46 0 9.91-4.45 9.91-9.91 0-2.65-1.03-5.14-2.9-7.01A9.82 9.82 0 0 0 12.04 2m.01 1.67c2.2 0 4.26.86 5.82 2.42a8.13 8.13 0 0 1 2.41 5.83c0 4.54-3.7 8.23-8.24 8.23-1.48 0-2.93-.39-4.19-1.15l-.3-.17-3.12.82.83-3.04-.19-.3a8.13 8.13 0 0 1-1.26-4.38c.01-4.54 3.7-8.24 8.24-8.24m-3.53 4.75c-.19 0-.52.07-.79.37-.27.3-.85.85-.85 2.06 0 1.21.88 2.39 1 2.56.12.17 1.74 2.65 4.21 3.72.58.26 1.04.41 1.4.52.59.19 1.13.16 1.56.1.47-.07 1.46-.6 1.67-1.18.2-.58.2-1.07.14-1.18-.06-.1-.23-.17-.48-.3s-1.46-.72-1.69-.81-.4-.13-.56.12-.63.81-.78.97-.29.18-.54.06c-.25-.13-1.06-.39-2.03-1.25-.75-.67-1.26-1.5-1.4-1.76-.15-.26-.02-.4.11-.53.12-.11.25-.3.38-.45s.17-.25.25-.42c.09-.17.04-.33-.02-.45s-.56-1.35-.77-1.85c-.2-.49-.41-.42-.56-.43h-.48z"/></svg>
                    </button>
                    <button onclick="deleteCurrentCustomer()" class="text-red-300 p-2">
                        <svg class="icon" viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                    </button>
                </div>
            </div>
            
            <div class="p-6 bg-blue-50 text-center border-b">
                <p id="view-cust-status-label" class="text-sm text-gray-500 font-bold uppercase tracking-wider">বর্তমান অবস্থা</p>
                <h1 id="view-cust-balance" class="text-4xl font-black mt-1">৳ 0</h1>
            </div>

            <div class="p-4 flex gap-3">
                <button onclick="showModal('sell-modal')" class="flex-1 bg-green-600 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95">মুরগি সেল</button>
                <button onclick="showModal('payment-modal')" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95">বকেয়া জমা</button>
            </div>

            <div class="p-4 mb-20">
                <h3 class="font-bold text-gray-600 mb-3 border-b pb-2">লেনদেনের ইতিহাস</h3>
                <div id="transaction-list" class="space-y-2"></div>
            </div>
        </div>

        <div id="settings-modal" class="hidden fixed inset-0 bg-white z-[150] p-6 overflow-y-auto">
            <div class="flex items-center mb-8">
                <button onclick="hideModal('settings-modal')" class="text-blue-700 mr-4">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                </button>
                <h2 class="text-2xl font-bold">সেটিংস</h2>
            </div>
            <div class="space-y-6">
                <div class="bg-blue-50 p-4 rounded-2xl border border-blue-100">
                    <label class="block text-gray-600 font-bold mb-3 text-sm uppercase">ডেটা ব্যাকআপ ও রিস্টোর</label>
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="exportData()" class="bg-green-600 text-white py-3 rounded-xl font-bold text-sm shadow-sm active:scale-95">ব্যাকআপ ফাইল</button>
                        <label class="bg-orange-500 text-white py-3 rounded-xl font-bold text-sm shadow-sm active:scale-95 text-center cursor-pointer">
                            রিস্টোর ফাইল
                            <input type="file" id="restore-input" class="hidden" onchange="importData(event)">
                        </label>
                    </div>
                </div>
                <div>
                    <label class="block text-gray-600 font-bold mb-2 text-sm uppercase">প্রোফাইল ছবি</label>
                    <input type="file" id="profile-upload" onchange="updateProfilePic(event)" class="w-full p-2 border-2 border-dashed rounded-xl border-blue-200">
                </div>
                <div>
                    <label class="block text-gray-600 font-bold mb-2 text-sm uppercase">পিন পরিবর্তন</label>
                    <input type="password" id="new-pin" placeholder="নতুন ৪ সংখ্যার পিন" class="w-full p-4 border rounded-xl mb-3 outline-none focus:ring-2 focus:ring-blue-400">
                    <button onclick="saveNewPin()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold">পিন আপডেট করুন</button>
                </div>
            </div>
        </div>

        <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-3 text-gray-400 shadow-[0_-5px_15px_rgba(0,0,0,0.05)] z-[55]">
            <button onclick="hideDetails()" class="text-blue-600 flex flex-col items-center">
                <svg class="icon mb-1" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                <span class="text-[10px] font-bold">হোম</span>
            </button>
            <button onclick="showModal('settings-modal')" class="flex flex-col items-center">
                <svg class="icon mb-1" viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
                <span class="text-[10px] font-bold">সেটিংস</span>
            </button>
            <button onclick="logout()" class="flex flex-col items-center text-red-500">
                <svg class="icon mb-1" viewBox="0 0 24 24"><path d="M10.09 15.59L11.5 17l5-5-5-5-1.41 1.41L12.67 11H3v2h9.67l-2.58 2.59zM19 3H5c-1.11 0-2 .9-2 2v4h2V5h14v14H5v-4H3v4c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg>
                <span class="text-[10px] font-bold">লগআউট</span>
            </button>
        </nav>
    </div>

    <div id="pin-confirm-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-6 z-[300]">
        <div class="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl text-center">
            <h2 class="text-xl font-bold mb-2">নিরাপত্তা যাচাই</h2>
            <p class="text-gray-500 text-sm mb-6">মুছে ফেলার জন্য পিন দিন</p>
            <input type="password" id="confirm-pin-input" placeholder="পিন কোড" class="w-full p-4 border-2 border-gray-100 rounded-2xl mb-6 text-center text-2xl tracking-widest outline-none focus:border-red-400">
            <div class="flex gap-2">
                <button onclick="hideModal('pin-confirm-modal')" class="flex-1 py-3 bg-gray-100 rounded-xl font-bold">বাতিল</button>
                <button id="confirm-delete-btn" class="flex-1 py-3 bg-red-600 text-white rounded-xl font-bold shadow-lg">নিশ্চিত করুন</button>
            </div>
        </div>
    </div>

    <div id="add-customer-modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center p-6 z-[120]">
        <div class="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl">
            <h2 class="text-xl font-bold mb-4 text-blue-700">নতুন কাস্টমার</h2>
            <input type="text" id="cust-name" placeholder="কাস্টমারের নাম" class="w-full p-4 border rounded-xl mb-3 outline-none">
            <input type="tel" id="cust-phone" placeholder="মোবাইল নাম্বার" class="w-full p-4 border rounded-xl mb-5 outline-none">
            <div class="flex gap-2">
                <button onclick="hideModal('add-customer-modal')" class="flex-1 py-3 bg-gray-100 rounded-xl font-bold">বাতিল</button>
                <button onclick="saveCustomer()" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold shadow-lg">সেভ করুন</button>
            </div>
        </div>
    </div>

    <div id="sell-modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center p-6 z-[120]">
        <div class="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl">
            <h2 class="text-xl font-bold mb-4 text-green-700">মুরগি বিক্রি</h2>
            <div class="space-y-3">
                <div class="flex gap-2">
                    <input type="number" id="sell-kg" oninput="calcTotal()" placeholder="কেজি" class="w-1/2 p-3 border rounded-xl">
                    <input type="number" id="sell-rate" oninput="calcTotal()" placeholder="রেট" class="w-1/2 p-3 border rounded-xl">
                </div>
                <div class="bg-blue-50 p-3 rounded-xl flex justify-between items-center">
                    <span id="sell-total" class="text-xl font-black text-blue-700 w-full text-center">৳ ০</span>
                </div>
                <input type="number" id="sell-paid" placeholder="জমা টাকা" class="w-full p-3 border rounded-xl">
            </div>
            <div class="flex gap-2 mt-6">
                <button onclick="hideModal('sell-modal')" class="flex-1 py-3 bg-gray-100 rounded-xl font-bold">বাতিল</button>
                <button onclick="recordTransaction('sell')" class="flex-1 py-3 bg-green-600 text-white rounded-xl font-bold shadow-lg">নিশ্চিত</button>
            </div>
        </div>
    </div>

    <div id="payment-modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center p-6 z-[120]">
        <div class="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl">
            <h2 class="text-xl font-bold mb-4 text-blue-700">বকেয়া জমা</h2>
            <input type="number" id="payment-amount" placeholder="পরিমাণ (৳)" class="w-full p-4 border rounded-xl mb-4 text-center font-bold">
            <div class="flex gap-2">
                <button onclick="hideModal('payment-modal')" class="flex-1 py-3 bg-gray-100 rounded-xl font-bold">বাতিল</button>
                <button onclick="recordTransaction('payment')" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold shadow-lg">জমা করুন</button>
            </div>
        </div>
    </div>

    <script>
        let db;
        const request = indexedDB.open("NasimStoreDB", 1);
        request.onupgradeneeded = (e) => {
            db = e.target.result;
            if (!db.objectStoreNames.contains("customers")) {
                db.createObjectStore("customers", { keyPath: "id", autoIncrement: true });
            }
        };
        request.onsuccess = (e) => { db = e.target.result; autoLogin(); loadSettings(); renderCustomers(); };

        let currentCustomerId = null;
        let deleteAction = null;

        function checkLogin() {
            const input = document.getElementById('pin-input').value;
            const savedPin = localStorage.getItem('appPin') || '1234';
            if(input === savedPin) { localStorage.setItem('isLoggedIn', 'true'); showApp(); } 
            else { alert("ভুল পিন!"); }
        }
        function autoLogin() { if(localStorage.getItem('isLoggedIn') === 'true') showApp(); }
        function showApp() { document.getElementById('login-screen').classList.add('hidden'); document.getElementById('app-content').classList.remove('hidden'); }
        function logout() { if(confirm("লগআউট করতে চান?")) { localStorage.removeItem('isLoggedIn'); location.reload(); } }
        function showModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function hideModal(id) { document.getElementById(id).classList.add('hidden'); }

        function saveCustomer() {
            const name = document.getElementById('cust-name').value;
            const phone = document.getElementById('cust-phone').value;
            if(!name || !phone) return;
            const tx = db.transaction("customers", "readwrite");
            tx.objectStore("customers").add({ name, phone, balance: 0, transactions: [], date: new Date().toLocaleDateString('bn-BD') });
            tx.oncomplete = () => { hideModal('add-customer-modal'); renderCustomers(); };
        }

        function renderCustomers() {
            const container = document.getElementById('customer-list');
            const search = document.getElementById('search-box').value.toLowerCase();
            const tx = db.transaction("customers", "readonly");
            tx.objectStore("customers").getAll().onsuccess = (e) => {
                const customers = e.target.result;
                let html = '', tRec = 0, tPay = 0, count = 0;
                customers.forEach(cust => {
                    if(cust.name.toLowerCase().includes(search) || cust.phone.includes(search)) {
                        count++;
                        if(cust.balance >= 0) tRec += cust.balance; else tPay += Math.abs(cust.balance);
                        html += `
                        <div class="bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center border-l-4 ${cust.balance >= 0 ? 'border-red-500' : 'border-green-500'}" onclick="openDetails(${cust.id})">
                            <div><h4 class="font-bold text-gray-800 text-lg">${cust.name}</h4><p class="text-xs text-gray-500">${cust.phone}</p></div>
                            <div class="text-right"><p class="font-bold ${cust.balance >= 0 ? 'text-red-600' : 'text-green-600'}">৳ ${Math.abs(cust.balance)}</p></div>
                        </div>`;
                    }
                });
                container.innerHTML = html;
                document.getElementById('total-receivable').innerText = tRec;
                document.getElementById('total-payable').innerText = tPay;
                document.getElementById('cust-count').innerText = count + " জন";
            };
        }

        function openDetails(id) {
            currentCustomerId = id;
            db.transaction("customers").objectStore("customers").get(id).onsuccess = (e) => {
                const cust = e.target.result;
                document.getElementById('view-cust-name').innerText = cust.name;
                document.getElementById('view-cust-phone').innerText = cust.phone;
                document.getElementById('view-cust-balance').innerText = "৳ " + Math.abs(cust.balance);
                renderTransactions(cust.transactions);
                document.getElementById('details-view').classList.remove('hidden');
            };
        }

        function hideDetails() { document.getElementById('details-view').classList.add('hidden'); }
        function calcTotal() {
            const kg = document.getElementById('sell-kg').value || 0;
            const rate = document.getElementById('sell-rate').value || 0;
            document.getElementById('sell-total').innerText = "৳ " + (kg * rate);
        }

        function recordTransaction(type) {
            const tx = db.transaction("customers", "readwrite");
            const store = tx.objectStore("customers");
            store.get(currentCustomerId).onsuccess = (e) => {
                const cust = e.target.result;
                let net = 0, details = "", amount = 0;
                if(type === 'sell') {
                    const kg = parseFloat(document.getElementById('sell-kg').value) || 0;
                    const rate = parseFloat(document.getElementById('sell-rate').value) || 0;
                    const paid = parseFloat(document.getElementById('sell-paid').value) || 0;
                    amount = kg * rate; net = amount - paid;
                    details = `${kg} কেজি (দর ${rate}) - জমা ৳${paid}`;
                    hideModal('sell-modal');
                } else {
                    amount = parseFloat(document.getElementById('payment-amount').value) || 0;
                    net = -amount; details = `বকেয়া জমা ৳${amount}`;
                    hideModal('payment-modal');
                }
                cust.balance += net;
                cust.transactions.unshift({ id: Date.now(), type, amount, netImpact: net, details, date: new Date().toLocaleString('bn-BD') });
                store.put(cust).onsuccess = () => { openDetails(currentCustomerId); renderCustomers(); };
            };
        }

        function renderTransactions(list) {
            document.getElementById('transaction-list').innerHTML = list.map(t => `
                <div class="bg-gray-50 p-3 rounded-xl border flex justify-between items-center">
                    <div><p class="font-bold text-sm">${t.details}</p><p class="text-[10px] text-gray-400">${t.date}</p></div>
                    <div class="flex items-center gap-2">
                        <p class="font-bold ${t.type === 'sell' ? 'text-red-500' : 'text-green-600'}">৳${t.amount}</p>
                        <button onclick="askPinForDelete('transaction', ${t.id})" class="text-red-300">
                           <svg class="icon w-4 h-4" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                        </button>
                    </div>
                </div>`).join('');
        }

        function askPinForDelete(type, id) {
            deleteAction = { type, id };
            showModal('pin-confirm-modal');
            document.getElementById('confirm-delete-btn').onclick = validatePinAndExecute;
        }

        function validatePinAndExecute() {
            if(document.getElementById('confirm-pin-input').value === (localStorage.getItem('appPin') || '1234')) {
                if(deleteAction.type === 'transaction') {
                    const tx = db.transaction("customers", "readwrite");
                    const store = tx.objectStore("customers");
                    store.get(currentCustomerId).onsuccess = (e) => {
                        const cust = e.target.result;
                        const t = cust.transactions.find(x => x.id === deleteAction.id);
                        cust.balance -= t.netImpact;
                        cust.transactions = cust.transactions.filter(x => x.id !== deleteAction.id);
                        store.put(cust).onsuccess = () => { openDetails(currentCustomerId); renderCustomers(); hideModal('pin-confirm-modal'); };
                    };
                } else {
                    db.transaction("customers", "readwrite").objectStore("customers").delete(currentCustomerId).onsuccess = () => { hideDetails(); renderCustomers(); hideModal('pin-confirm-modal'); };
                }
            } else { alert("ভুল পিন!"); }
        }

        function deleteCurrentCustomer() { askPinForDelete('customer', currentCustomerId); }

        function shareToWhatsApp() {
            const tx = db.transaction("customers", "readonly");
            tx.objectStore("customers").get(currentCustomerId).onsuccess = (e) => {
                const cust = e.target.result;
                const status = cust.balance >= 0 ? "বকেয়া (পাওনা)" : "অগ্রিম জমা";
                const amount = Math.abs(cust.balance);
                const message = `*Nasim Store - মেমো*\n--------------------------\nসম্মানিত ${cust.name},\nআপনার বর্তমান হিসাব নিচে দেওয়া হলো:\n\nঅবস্থা: *${status}*\nপরিমাণ: *৳ ${amount}*\n\nধন্যবাদ আমাদের সাথে থাকার জন্য।`;
                window.open(`https://wa.me/88${cust.phone}?text=${encodeURIComponent(message)}`, '_blank');
            };
        }

        function saveNewPin() { 
            const p = document.getElementById('new-pin').value;
            if(p.length >= 4) { localStorage.setItem('appPin', p); alert("পিন আপডেট হয়েছে"); hideModal('settings-modal'); }
        }
        function updateProfilePic(e) {
            const r = new FileReader();
            r.onload = () => { localStorage.setItem('userPic', r.result); document.getElementById('profile-pic-display').src = r.result; };
            r.readAsDataURL(e.target.files[0]);
        }
        function loadSettings() {
            const p = localStorage.getItem('userPic');
            if(p) document.getElementById('profile-pic-display').src = p;
        }

        // Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
